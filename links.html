<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tamás Kovács — Linkek</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080A;--card:rgba(255,255,255,0.025);--card-h:rgba(255,255,255,0.055);
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);
  --text:#F2F4F8;--text2:rgba(242,244,248,0.68);
  --text3:rgba(242,244,248,0.40);--accent:#A78BFA;--accent-dim:rgba(167,139,250,0.08);
  --rs:8px;--font:'Inter',system-ui,-apple-system,sans-serif;--display:'Sora',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh}
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.005) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.005) 1px,transparent 1px);
  background-size:72px 72px}
.bg-portrait{position:fixed;top:-10%;right:-8%;width:50vw;max-width:500px;aspect-ratio:2/3;
  background:url('hero-photo.png') center 10%/cover no-repeat;
  filter:blur(24px) grayscale(1) brightness(.28) contrast(.95);opacity:.32;
  -webkit-mask-image:radial-gradient(ellipse at 70% 25%,rgba(0,0,0,.65) 0%,rgba(0,0,0,.25) 55%,transparent 72%);
  mask-image:radial-gradient(ellipse at 70% 25%,rgba(0,0,0,.65) 0%,rgba(0,0,0,.25) 55%,transparent 72%);
  z-index:0;pointer-events:none}
.page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1.25rem;max-width:420px;margin:0 auto;min-height:100vh}
.lib-lang{position:fixed;top:.85rem;right:1rem;z-index:10;display:flex;align-items:center;gap:.08rem}
.lang-btn{background:none;border:none;padding:.18rem .3rem;color:var(--text3);cursor:pointer;font-family:var(--font);font-size:.68rem;font-weight:600;transition:color .2s;border-radius:3px}
.lang-btn.active{color:var(--text)}
.lang-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.lang-sep{color:var(--text3);font-size:.6rem}
.lib-avatar{width:68px;height:68px;border-radius:50%;background:url('hero-photo.png') center 15%/cover no-repeat;filter:grayscale(1) contrast(1.1);border:2px solid var(--border);margin-bottom:.65rem}
.lib-name{font-family:var(--display);font-size:1.05rem;font-weight:700;margin-bottom:.2rem}
.lib-desc{font-size:.8rem;color:var(--text2);text-align:center;margin-bottom:1.5rem;max-width:300px;line-height:1.45}
.lib-links{display:flex;flex-direction:column;gap:.55rem;width:100%}
.lib-btn{display:flex;align-items:center;gap:.7rem;padding:.8rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);text-decoration:none;color:var(--text);transition:all .2s;width:100%}
.lib-btn:hover{background:var(--card-h);border-color:var(--border-h);transform:translateY(-1px)}
.lib-btn:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.lib-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;background:var(--accent-dim);border:1px solid rgba(167,139,250,.1)}
.lib-text{flex:1}
.lib-title{font-family:var(--display);font-size:.78rem;font-weight:600;margin-bottom:.05rem}
.lib-subdesc{font-size:.68rem;color:var(--text3);line-height:1.35}
.lib-arrow{color:var(--text3);font-size:.7rem}
.lib-footer{margin-top:1.75rem;font-size:.62rem;color:var(--text3)}
.lib-footer a{color:var(--text2);text-decoration:none;transition:color .2s}
.lib-footer a:hover{color:var(--accent)}
@media(max-width:400px){.page{padding:2rem 1rem}.lib-btn{padding:.7rem .85rem}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-portrait"></div>
<div class="lib-lang">
  <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
  <span class="lang-sep">/</span>
  <button class="lang-btn active" data-lang="hu" aria-pressed="true">HU</button>
</div>
<div class="page">
  <div class="lib-avatar"></div>
  <div class="lib-name">Tamás Kovács</div>
  <div class="lib-desc" data-i18n="lib_desc">Itt találsz meg: projektek, napi összefoglalók, tartalmak.</div>
  <div class="lib-links" id="libLinks"></div>
  <div class="lib-footer"><a href="./index.html" data-i18n="lib_full">Teljes oldal →</a></div>
</div>
<script>
const CONFIG={
  piacradar:'https://t.me/+Mk5bfbCfUf1lMGE0',
  ausztriaradar:'https://preview.mailerlite.io/forms/122717218075691469/8716491/share',
  sample:'#',
  tiktok:'https://www.tiktok.com/@officialkovacstamas',
  instagram:'https://www.instagram.com/officialkovacstamas',
  youtube:'https://www.youtube.com/@officialkovacstamas',
  linkedin:'https://www.linkedin.com/in/kvcstms',
  email:'mailto:tamas11kovacs@gmail.com',
};
const BUTTONS=[
  {url:CONFIG.piacradar,icon:'\u{1F4C8}',hu_t:'Piacradar \u2014 Telegram',en_t:'Piacradar \u2014 Telegram',hu_d:'Magyar piaci \u00f6sszefoglal\u00f3k, makr\u00f3 \u00e9s gyorsjelent\u00e9sek.',en_d:'Hungarian market briefings, macro and earnings.'},
  {url:CONFIG.ausztriaradar,icon:'\u{1F1E6}\u{1F1F9}',hu_t:'Ausztria Radar \u2014 H\u00edrrev\u00e9l',en_t:'Ausztria Radar \u2014 Newsletter',hu_d:'Osztr\u00e1k h\u00edrek \u00e9s h\u00e9tk\u00f6znapok magyarul.',en_d:'Austria news and life in Hungarian.'},
  {url:CONFIG.sample,icon:'\u{1F4C4}',hu_t:'Friss Piacradar minta',en_t:'Latest Piacradar sample',hu_d:'N\u00e9zd meg egy friss esti piaci \u00f6sszefoglal\u00f3t.',en_d:'See a recent evening market wrap.'},
  {url:CONFIG.tiktok,icon:'\u{1F3B5}',hu_t:'TikTok',en_t:'TikTok',hu_d:'R\u00f6vid vide\u00f3k piacokr\u00f3l \u00e9s az ausztriai \u00e9letr\u0151l.',en_d:'Shorts about markets and Austrian life.'},
  {url:CONFIG.instagram,icon:'\u{1F4F8}',hu_t:'Instagram',en_t:'Instagram',hu_d:'K\u00e9pek, sztorik, \u00e9let Ausztri\u00e1ban.',en_d:'Snapshots and stories from Austria.'},
  {url:CONFIG.youtube,icon:'\u25B6\uFE0F',hu_t:'YouTube',en_t:'YouTube',hu_d:'Hosszabb magyar\u00e1z\u00f3 vide\u00f3k \u00e9s elemz\u00e9sek.',en_d:'Longer explainers and breakdowns.'},
  {url:CONFIG.linkedin,icon:'\u{1F4BC}',hu_t:'LinkedIn',en_t:'LinkedIn',hu_d:'Szakmai h\u00e1tt\u00e9r \u00e9s term\u00e9kmunka.',en_d:'My product and telecom background.'},
  {url:CONFIG.email,icon:'\u2709\uFE0F',hu_t:'Kapcsolat',en_t:'Contact',hu_d:'Egy\u00fcttm\u0171k\u00f6d\u00e9s, megkeres\u00e9s, aj\u00e1nlat.',en_d:'Work with me or propose a collab.'},
];
const T={
  hu:{lib_desc:'Itt tal\u00e1lsz meg: projektek, napi \u00f6sszefoglal\u00f3k, tartalmak.',lib_full:'Teljes oldal \u2192'},
  en:{lib_desc:'Where to find my work and daily briefings.',lib_full:'Full site \u2192'}
};
let lang=localStorage.getItem('tk_lang')||'hu';
function render(){
  const c=document.getElementById('libLinks');c.innerHTML='';
  BUTTONS.forEach(b=>{
    const a=document.createElement('a');
    a.href=b.url;a.target='_blank';a.rel='noopener';a.className='lib-btn';
    a.innerHTML='<div class="lib-icon">'+b.icon+'</div><div class="lib-text"><div class="lib-title">'+b[lang+'_t']+'</div><div class="lib-subdesc">'+b[lang+'_d']+'</div></div><span class="lib-arrow">\u2192</span>';
    c.appendChild(a);
  });
}
function setLang(l){
  lang=l;localStorage.setItem('tk_lang',l);
  document.documentElement.lang=l;
  const t=T[l];
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(t[k]!=null)el.textContent=t[k];});
  document.querySelectorAll('.lang-btn').forEach(b=>{const a=b.dataset.lang===l;b.classList.toggle('active',a);b.setAttribute('aria-pressed',a);});
  render();
}
document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
setLang(lang);
</script>
</body>
</html>
